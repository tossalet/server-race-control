<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Race Control - Cargando...</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000000;
    background-image: url('bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: sans-serif;
  }
  
  /* Contenedor principal de los cuadraditos, replicando exactamente Plymouth */
  .progress-container {
    position: absolute;
    bottom: 150px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px; /* Box spacing de 8px */
  }
  
  /* Cuadradito individual */
  .progress-box {
    width: 16px;
    height: 16px;
    background-color: #0077b6; /* Azul base */
    opacity: 0.15;
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(0, 119, 182, 0.4);
    transition: opacity 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
  }
  
  /* Cuadradito activo */
  .progress-box.active {
    opacity: 1.0;
    background-color: #00d2ff; /* Azul brillante */
    box-shadow: 0 0 12px rgba(0, 210, 255, 0.9), 0 0 4px rgba(0, 210, 255, 0.6);
  }
  
  /* Texto opcional de carga para dar sensación premium */
  .loading-text {
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="progress-container" id="boxes-container"></div>
<div class="loading-text" id="status-text">Iniciando Sistema</div>

<!-- Cargar archivo de configuración dinámico generado durante la instalación -->
<script src="config.js"></script>

<script>
  const container = document.getElementById('boxes-container');
  const statusText = document.getElementById('status-text');
  const numBoxes = 20;
  const boxes = [];
  
  // Generar los 20 cuadraditos
  for (let i = 0; i < numBoxes; i++) {
    const box = document.createElement('div');
    box.className = 'progress-box';
    container.appendChild(box);
    boxes.push(box);
  }
  
  // Animación del progreso de carga de los cuadraditos (bucle infinito hasta que el servidor responda)
  let currentIndex = 0;
  let cycle = 0;
  
  const animateBoxes = () => {
    // Primera vuelta: encender uno a uno secuencialmente (simulando Plymouth)
    if (cycle === 0) {
      if (currentIndex < numBoxes) {
        boxes[currentIndex].classList.add('active');
        currentIndex++;
      } else {
        cycle = 1;
        currentIndex = 0;
      }
    } else {
      // Siguientes vueltas: hacer un efecto de barrido suave de izquierda a derecha
      for (let i = 0; i < numBoxes; i++) {
        const offset = Math.abs(i - currentIndex);
        if (offset === 0) {
          boxes[i].classList.add('active');
          boxes[i].style.opacity = '1.0';
        } else if (offset === 1) {
          boxes[i].classList.add('active');
          boxes[i].style.opacity = '0.6';
        } else if (offset === 2) {
          boxes[i].classList.add('active');
          boxes[i].style.opacity = '0.3';
        } else {
          boxes[i].classList.remove('active');
          boxes[i].style.opacity = '0.15';
        }
      }
      currentIndex = (currentIndex + 1) % numBoxes;
    }
  };
  
  // Ejecutar animación cada 150ms
  const animationInterval = setInterval(animateBoxes, 150);
  
  // Lista de textos de estado dinámicos
  const messages = ["Conectando con el Servidor", "Cargando Flujos SRT", "Inicializando Cámaras", "Preparando Kiosko"];
  let msgIdx = 0;
  setInterval(() => {
    if (statusText) {
      statusText.textContent = messages[msgIdx];
      msgIdx = (msgIdx + 1) % messages.length;
    }
  }, 3000);
  
  // Obtener puerto de la configuración global
  const port = (window.KIOSK_CONFIG && window.KIOSK_CONFIG.port) || '3000';
  // Detectar automáticamente el navegador para elegir el mejor modo de transcodificación
  const isChrome = /Chrome|Chromium/i.test(navigator.userAgent);
  const forceTranscode = isChrome ? '1' : '0';
  
  const checkServer = () => {
    const img = new Image();
    
    img.onload = () => {
      // Servidor listo! Redirigir al panel de control grabador
      clearInterval(animationInterval);
      if (statusText) statusText.textContent = "Conectado";
      
      // Delay muy corto para suavizar la transición antes del redirect
      setTimeout(() => {
        window.location.href = "http://localhost:" + port + "/grabador?force_transcode=" + forceTranscode;
      }, 500);
    };
    
    img.onerror = () => {
      // Servidor no listo, volver a intentar en 500ms
      setTimeout(checkServer, 500);
    };
    
    // Cargamos bars.svg para verificar que el servidor de Race Control responde sin problemas de CORS
    img.src = "http://localhost:" + port + "/images/bars.svg?t=" + Date.now();
  };
  
  // Iniciar la comprobación del servidor tras 1 segundo
  setTimeout(checkServer, 1000);
</script>

</body>
</html>
